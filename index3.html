<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Spatial Scene Full</title>
    <style>
        :root { 
          --x: 0; 
          --y: 0;
      }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000; /* Nero di sicurezza */
        }

        /* Il contenitore occupa tutto lo schermo */
        .viewport {
            width: 100vw;
            height: 100vh;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spatial-scene {
            width: 110%; /* Più largo per coprire i bordi durante la rotazione */
            height: 110%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(calc(var(--x) * 1deg)) rotateX(calc(var(--y) * -1deg));
            transition: transform 0.2s cubic-bezier(0.2, 0.5, 0.4, 1);
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }

        /* LIVELLO SFONDO: Profondo e leggermente sfocato */
        .bg {
            background-image: url('./background.avif');
            transform: translateZ(-150px) scale(1.9); /* Molto profondo */
            filter: brightness(0.8);
        }

        /* LIVELLO SOGGETTO: Al centro dello spazio 3D */
        .subject {
            background-image: url('./subject.png');
            background-repeat: no-repeat;
            background-size: contain;
            background-position: bottom 100px center;
            transform: translateZ(50px) scale(0.85);
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.4));
        }

        /* LIVELLO ELEMENTI DAVANTI: Testo o UI */
        .ui {
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(200px); /* Molto vicino all'utente */
            pointer-events: none;
        }

        h1 {
            color: white;
            font-family: -apple-system, sans-serif;
            font-size: 5rem;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="viewport">
    <div class="spatial-scene">
        <div class="layer bg"></div>
        <div class="layer subject"></div>
        <div class="layer ui">
            <h1>ALPS</h1>
        </div>
    </div>
</div>

<script>
    const update = (x, y) => {
        // Limitiamo il movimento per non mostrare i bordi dell'immagine
        const limitX = (x - window.innerWidth / 2) / (window.innerWidth / 40);
        const limitY = (y - window.innerHeight / 2) / (window.innerHeight / 40);
        
        document.documentElement.style.setProperty('--x', limitX.toFixed(2));
        document.documentElement.style.setProperty('--y', limitY.toFixed(2));
    };

    window.addEventListener('mousemove', (e) => update(e.clientX, e.clientY));

    // Per Mobile
    window.addEventListener('deviceorientation', (e) => {
        if (!e.gamma) return;
        document.documentElement.style.setProperty('--x', (e.gamma / 2.5).toFixed(2));
        document.documentElement.style.setProperty('--y', ((e.beta - 45) / 2.5).toFixed(2));
    });
</script>

</body>
</html>
