<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS Spatial Scene - Test Funzionante</title>
    <style>
      :root {
        --x: 0;
        --y: 0;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111; /* Sfondo scuro di base */
      }

      .viewport {
        width: 100vw;
        height: 100vh;
        perspective: 1200px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spatial-scene {
        width: 120%;
        height: 120%;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateY(calc(var(--x) * 1deg)) rotateX(calc(var(--y) * -1deg));
        /* transition: transform 0.1s ease-out; */
        transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .layer {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* LIVELLO 1: SFONDO (Gradiente) */
      .bg {
        background: radial-gradient(circle at center, #2c3e50, #000000);
        transform: translateZ(-200px) scale(2);
      }

      /* LIVELLO 2: ELEMENTI DECORATIVI (Stelle/Particelle) */
      .stars {
        background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)), radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0));
        background-size: 200px 200px;
        transform: translateZ(-100px) scale(1.5);
        opacity: 0.5;
      }

      /* LIVELLO 3: SOGGETTO CENTRALE */
      .subject {
        transform: translateZ(100px);
        font-size: 150px;
        filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.8));
      }

      /* LIVELLO 4: TESTO DAVANTI */
      .ui {
        transform: translateZ(250px);
        color: white;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
      }

      h1 {
        font-size: 3rem;
        margin: 0;
        letter-spacing: 5px;
      }

      /* Pulsante Attivazione */
      #unlock {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 15px 30px;
        border-radius: 50px;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        color: white;
        font-weight: bold;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <button id="unlock">AVVIA SCENA SPAZIALE</button>
    <div class="viewport">
      <div class="spatial-scene">
        <!-- Ora usiamo solo CSS e caratteri per sicurezza -->
        <div class="layer bg"></div>
        <div class="layer stars"></div>
        <div class="layer subject">🪐</div>
        <div class="layer ui">
          <h1>SPACE</h1>
        </div>
      </div>
    </div>

    <script>
      const btn = document.getElementById("unlock");
      const root = document.documentElement;

      // Funzione di movimento fluida
      const handleOrientation = (e) => {
        if (e.gamma === null || e.beta === null) return;

        // Gamma: inclinazione laterale (-90 a 90)
        // Beta: inclinazione avanti/dietro
        let x = e.gamma;
        let y = e.beta - 45; // Offset per impugnatura naturale

        // Aumentiamo il moltiplicatore: da 2 a 5 per rendere l'effetto visibile
        const sensitivity = 0.8;

        // Applichiamo i valori alle variabili CSS
        root.style.setProperty("--x", (x * sensitivity).toFixed(2));
        root.style.setProperty("--y", (y * sensitivity).toFixed(2));
      };

      btn.onclick = () => {
        // 1. Rimuoviamo il pulsante
        btn.style.display = "none";

        // 2. Registriamo l'evento (su Android 14 Chrome è necessario farlo dopo un click)
        if (typeof DeviceOrientationEvent !== "undefined") {
          window.addEventListener("deviceorientation", handleOrientation, true);
        } else {
          alert("Il tuo dispositivo non supporta i sensori di movimento.");
        }
      };
    </script>
  </body>
</html>
